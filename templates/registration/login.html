{% extends "base/base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-4">

        <div class="card">

            <div class="card-body">

                <h3 class="mb-4">
                    Login
                </h3>

                <form method="post">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button
                        type="submit"
                        class="btn btn-primary w-100"
                    >
                        Login
                    </button>

                </form>

            </div>
            <div class="mt-3 text-center">

                <a href="{% url 'student_signup' %}">
                    Create Student Account
                </a>

            </div>
        </div>

    </div>

</div>

{% endblock %}
