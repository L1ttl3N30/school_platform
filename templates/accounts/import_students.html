{% extends "base/base.html" %}

{% block title %}
Import Students
{% endblock %}

{% block content %}

<h1 class="mb-4">
    Import Students
</h1>

<div class="card">

    <div class="card-body">

        <form
            method="post"
            enctype="multipart/form-data"
        >

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn btn-primary"
            >
                Import Students
            </button>

        </form>

    </div>

</div>

{% endblock %}
